<style>
body {
margin:0;
font-family: 'Segoe UI', sans-serif;
background: url('background.jpg') no-repeat center center/cover;
display:flex;
justify-content:center;
align-items:center;
height:100vh;

}

.overlay {
background: rgba(0,0,0,0.88);
padding:20px;
border-radius:15px;
text-align:center;
width:82%;
max-width:350px;
border:2px solid #ff6a00;
box-shadow:0 0 30px #ff6a00;
animation: glow 2s infinite alternate;
}

@keyframes glow {
from { box-shadow: 0 0 15px #ff6a00; }
to { box-shadow: 0 0 35px #ff3c00; }
}

.logo {
width:120px;
height:120px;
border-radius:50%;
border:3px solid #ff6a00;

h1 {

}

.note {
background:#1a1a1a;
padding:10px;

margin-bottom:15px;
font-size:14px;
border:1px solid #ff6a00;
}

.timer {
font-size:36px;
color:#ff3c00;
margin:15px 0;
font-weight:bold;
}

button {
background:#ff6a00;
border:none;
padding:15px;
width:100%;
border-radius:30px;
color:white;
font-size:16px;
cursor:pointer;
box-shadow:0 0 20px #ff6a00;
transition:0.3s;

}

button:hover {
background:#ff3c00;

}

.history {

font-size: 14px;

fbq('trackCustom', 'TimerCompleted');

// Redirect to Telegram
